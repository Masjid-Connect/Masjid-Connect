<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background: rounded square in Sapphire -->
  <rect width="32" height="32" rx="7" fill="#0F2D52"/>

  <!-- Arabic م (Meem) - stylized, top-left area -->
  <!-- Meem is drawn as a curved bowl with a tail -->
  <g fill="#fff">
    <!-- Meem body: open bowl shape -->
    <path d="M6 13 Q6 8 11 8 Q14 8 14 11 L14 16 Q14 18 12 18 L9 18 Q6 18 6 15 Z" fill="#fff"/>
    <!-- Meem interior cutout -->
    <path d="M8 13 Q8 10 11 10 Q12.5 10 12.5 11.5 L12.5 15.5 Q12.5 16.5 11 16.5 L9.5 16.5 Q8 16.5 8 15 Z" fill="#0F2D52"/>
  </g>

  <!-- Arabic س (Seen) - stylized, bottom-right area -->
  <!-- Seen is drawn as three teeth on a baseline -->
  <g fill="#fff">
    <!-- Three teeth of Seen -->
    <rect x="16" y="12" width="3" height="10" rx="1.2"/>
    <rect x="20.5" y="14" width="3" height="8" rx="1.2"/>
    <rect x="25" y="12" width="3" height="10" rx="1.2"/>
    <!-- Baseline connector -->
    <rect x="16" y="20" width="12" height="2.5" rx="1"/>
  </g>

  <!-- Gold accent dot (diacritical feel) -->
  <circle cx="16" cy="6" r="1.5" fill="#D4AF37"/>
</svg>
