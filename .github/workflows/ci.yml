name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend (TypeScript, Lint, Test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci --legacy-peer-deps

      - name: TypeScript
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test -- --ci --coverage --coverageThreshold='{"global":{"statements":40,"branches":30,"functions":35,"lines":40}}'

  backend:
    name: Backend (Django Tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    # Postgres service container — backend/config/settings.py defaults to
    # postgres://localhost:5432/masjid_connect, so CI needs a running
    # instance. Credentials are ephemeral and match DATABASE_URL below.
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ci_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - run: pip install -r requirements.txt

      - name: Run migrations
        run: python manage.py migrate --run-syncdb
        env:
          SECRET_KEY: ci-test-key
          DEBUG: "True"
          ALLOWED_HOSTS: "*"
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/ci_test

      - name: Run tests
        run: python manage.py test api.tests
        env:
          SECRET_KEY: ci-test-key
          DEBUG: "True"
          ALLOWED_HOSTS: "*"
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/ci_test

  # -----------------------------------------------------------
  # Publish OTA update via EAS (only on push to main, after tests pass)
  # Requires EXPO_TOKEN secret set in repo settings.
  # -----------------------------------------------------------
  eas-update:
    name: EAS Update (OTA)
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci --legacy-peer-deps

      - name: Publish OTA update
        run: npx eas-cli update --branch production --auto --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

  # -----------------------------------------------------------
  # Deploy to production (only on push to main, after tests pass)
  # -----------------------------------------------------------
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /home/mosque/Masjid-Connect/backend
            ./scripts/deploy.sh
