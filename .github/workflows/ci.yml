name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend (TypeScript, Lint, Test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci --legacy-peer-deps

      - name: TypeScript
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test -- --ci --coverage

  backend:
    name: Backend (Django Tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - run: pip install -r requirements.txt

      - name: Run migrations
        run: python manage.py migrate --run-syncdb
        env:
          SECRET_KEY: ci-test-key
          DEBUG: "True"
          ALLOWED_HOSTS: "*"

      - name: Run tests
        run: python manage.py test api.tests
        env:
          SECRET_KEY: ci-test-key
          DEBUG: "True"
          ALLOWED_HOSTS: "*"
