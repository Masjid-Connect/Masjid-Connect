name: Scrape Prayer Timetables

on:
  # Run every Sunday at 2am UTC — refreshes monthly timetable data
  schedule:
    - cron: "0 2 * * 0"      # Every Sunday at 2am UTC
    - cron: "0 2 30 * *"     # 30th of each month
    - cron: "0 2 31 * *"     # 31st of each month (skipped for short months)
    - cron: "0 2 1 * *"      # 1st of each month
  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:
    inputs:
      mosque:
        description: "Scraper key (leave blank for all)"
        required: false
        default: "wright_street"

jobs:
  scrape:
    name: Scrape & Export Timetables
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - run: pip install -r requirements.txt

      - name: Run migrations
        run: python manage.py migrate --run-syncdb
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          ALLOWED_HOSTS: "*"

      - name: Seed mosque data (idempotent)
        run: python manage.py seed_data --production
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          ALLOWED_HOSTS: "*"

      - name: Scrape timetables
        run: python manage.py scrape_timetables --mosque ${{ github.event.inputs.mosque || 'wright_street' }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          ALLOWED_HOSTS: "*"

      - name: Export static timetable JSON for mobile app
        run: python manage.py export_timetable_json
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          ALLOWED_HOSTS: "*"

      - name: Commit updated timetable JSON
        working-directory: .
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add constants/static-timetable.json
          if git diff --cached --quiet; then
            echo "No timetable changes to commit"
          else
            git commit -m "chore: update static timetable from scraped data"
            git push
          fi

      - name: Trigger EAS Update (optional)
        if: ${{ hashFiles('constants/static-timetable.json') != '' }}
        continue-on-error: true
        run: |
          if command -v npx &> /dev/null && [ -f ../package.json ]; then
            cd ..
            npx eas-cli update --branch production --message "Update prayer timetable" --non-interactive
          else
            echo "EAS CLI not available — skipping OTA update"
          fi
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
