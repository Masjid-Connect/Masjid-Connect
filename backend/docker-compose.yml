# =============================================================
# Masjid Connect — Local Development Stack
# =============================================================
# This runs Django + PostgreSQL on your computer for development.
#
# HOW TO USE:
#   1. Copy .env.example to .env and fill in values
#   2. Run:  docker compose up
#   3. Visit: http://localhost:8000/health/
#   4. Admin: http://localhost:8000/admin/
#   5. API docs: http://localhost:8000/api/docs/
#
# FIRST TIME SETUP:
#   docker compose up -d
#   docker compose exec web python manage.py migrate
#   docker compose exec web python manage.py createsuperuser
#   docker compose exec web python manage.py seed_data
#
# STOP EVERYTHING:
#   docker compose down
#
# DELETE EVERYTHING (including database data):
#   docker compose down -v
# =============================================================

services:
  # -----------------------------------------------------------
  # PostgreSQL Database
  # -----------------------------------------------------------
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: masjid_connect
      POSTGRES_USER: mosque
      POSTGRES_PASSWORD: mosque_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mosque -d masjid_connect"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -----------------------------------------------------------
  # Django Web Application
  # -----------------------------------------------------------
  web:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DEBUG: "True"
      SECRET_KEY: "dev-secret-key-change-in-production"
      DATABASE_URL: "postgres://mosque:mosque_dev_password@db:5432/masjid_connect"
      ALLOWED_HOSTS: "*"
      CORS_ALLOWED_ORIGINS: "http://localhost:8081,http://localhost:19006"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # Mount your code so changes appear instantly (no rebuild needed)
      - .:/home/mosque/app
      - static_files:/home/mosque/app/staticfiles
      - media_files:/home/mosque/app/media
    # Override CMD to use Django dev server (auto-reloads on code changes)
    command: python manage.py runserver 0.0.0.0:8000

volumes:
  postgres_data:    # Stores your database files (survives restarts)
  static_files:     # Django admin CSS/JS
  media_files:      # Uploaded mosque photos
