# =============================================================
# Masjid Connect — Production Stack
# =============================================================
# This runs the app on your DigitalOcean server.
#
# HOW TO USE:
#   docker compose -f docker-compose.prod.yml up -d
#
# This file OVERRIDES docker-compose.yml settings for production.
# It uses Gunicorn instead of Django dev server, disables debug
# mode, and adds resource limits.
# =============================================================

services:
  # -----------------------------------------------------------
  # PostgreSQL Database (production settings)
  # -----------------------------------------------------------
  db:
    image: postgres:16-alpine
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-masjid_connect}
      POSTGRES_USER: ${POSTGRES_USER:-mosque}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    # No ports exposed — only the web service can reach the database
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mosque} -d ${POSTGRES_DB:-masjid_connect}"]
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 200M    # PostgreSQL is lightweight for this workload

  # -----------------------------------------------------------
  # Django Web Application (production settings)
  # -----------------------------------------------------------
  web:
    build: .
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "10"
    # No ports exposed — Traefik connects via Docker network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.masjid-api.rule=Host(`api.salafimasjid.app`)"
      - "traefik.http.routers.masjid-api.entrypoints=websecure"
      - "traefik.http.routers.masjid-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.masjid-api.loadbalancer.server.port=8000"
    env_file:
      - .env.prod
    environment:
      DEBUG: "False"
      DATABASE_URL: "postgres://${POSTGRES_USER:-mosque}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-masjid_connect}"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - static_files:/home/mosque/app/staticfiles
      - media_files:/home/mosque/app/media
    networks:
      - default
      - traefik
    # Uses Gunicorn (from Dockerfile CMD) — no override needed
    read_only: true
    tmpfs:
      - /tmp:size=64M
      - /home/mosque/.cache:size=32M
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 512M    # ~150M per Gunicorn worker × 3 workers + 4 threads each

networks:
  traefik:
    external: true    # Connects to Traefik's existing network

volumes:
  postgres_data:
  static_files:
  media_files:
