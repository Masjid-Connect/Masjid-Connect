# Nginx reverse proxy config for Masjid Connect
# This file is used on the production server.
# Copy it to: /etc/nginx/sites-available/salafimasjid
# Then symlink: ln -s /etc/nginx/sites-available/salafimasjid /etc/nginx/sites-enabled/

# -------------------------------------------------------------------
# Redirect all HTTP traffic to HTTPS
# -------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name api.salafimasjid.app;

    # Let's Encrypt certificate renewal needs this
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Everything else goes to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# -------------------------------------------------------------------
# Main HTTPS server
# -------------------------------------------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.salafimasjid.app;

    # ---------------------------------------------------------------
    # SSL certificates (created by Certbot)
    # ---------------------------------------------------------------
    ssl_certificate     /etc/letsencrypt/live/api.salafimasjid.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.salafimasjid.app/privkey.pem;

    # Modern SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # ---------------------------------------------------------------
    # Security headers
    # ---------------------------------------------------------------
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ---------------------------------------------------------------
    # File upload size limit (for mosque photos)
    # ---------------------------------------------------------------
    client_max_body_size 10M;

    # ---------------------------------------------------------------
    # Gzip compression (makes responses smaller = faster)
    # ---------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # ---------------------------------------------------------------
    # Serve static files directly (CSS, JS, images for admin panel)
    # Django's collectstatic puts them here
    # ---------------------------------------------------------------
    location /static/ {
        alias /home/mosque/Masjid-Connect/backend/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ---------------------------------------------------------------
    # Serve uploaded media files (mosque photos)
    # ---------------------------------------------------------------
    location /media/ {
        alias /home/mosque/Masjid-Connect/backend/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # ---------------------------------------------------------------
    # Send everything else to Django (via Gunicorn)
    # ---------------------------------------------------------------
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
